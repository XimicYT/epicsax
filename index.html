<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncSpace | Watch Together</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0f111a; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #eef2ff; }
        
        #sync-video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; z-index: 1; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; background: #000; }
        body.playing #sync-video { opacity: 1; pointer-events: auto; }
        
        #ui-layer { position: relative; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1d2d 0%, #0f111a 100%); transition: opacity 0.5s ease; }
        body.playing #ui-layer { opacity: 0; pointer-events: none; }
        
        .screen { display: none; text-align: center; backdrop-filter: blur(10px); background: rgba(30, 33, 48, 0.7); padding: 2.5rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 440px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .screen.active { display: block; }
        
        h1 { font-size: 2rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 1.5rem; color: #ffffff; }
        
        .btn { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); border: none; color: #fff; font-weight: 600; padding: 1.2rem; border-radius: 12px; cursor: pointer; width: 100%; margin-bottom: 1rem; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); }
        
        .master-btn { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669); border: none; color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3); margin: 1.5rem auto; display: flex; justify-content: center; align-items: center; letter-spacing: 1px; transition: all 0.2s; }
        .master-btn:hover { transform: scale(1.05); }
        
        #debug-terminal { width: 90%; max-width: 600px; height: 160px; background: rgba(15, 17, 26, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; margin-top: 2rem; padding: 1rem; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.8rem; color: #a5b4fc; text-align: left; pointer-events: auto; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .log-entry { padding-bottom: 6px; margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-warn { color: #fbbf24; } .log-error { color: #ef4444; } .log-success { color: #10b981; } .log-host { color: #60a5fa; font-weight: bold; }
        
        .source-box { margin-top: 1.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .source-box p { font-size: 0.8rem; color: #a5b4fc; margin-bottom: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .source-box input { width: 100%; padding: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 0.95rem; margin-bottom: 0.8rem; transition: border-color 0.2s; }
        .source-box input:focus { outline: none; border-color: #4f46e5; }
        
        .status-badge { display: inline-block; padding: 0.4rem 1rem; background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 0.9rem; font-weight: 600; color: #eef2ff; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <video id="sync-video" src="video.mp4" playsinline preload="auto"></video>

    <div id="ui-layer">
        
        <div id="screen-init" class="screen active">
            <h1>SyncSpace</h1>
            <p style="color: #9ca3af; margin-bottom: 2rem; font-size: 1rem;">Watch videos in perfect sync with your friends.</p>
            <button class="btn" onclick="initializeUplink()">Join Session</button>
        </div>

        <div id="screen-loading" class="screen">
            <h1 style="color: #60a5fa;">Connecting...</h1>
            <p style="color: #9ca3af;">Syncing clocks with the server</p>
        </div>

        <div id="screen-host" class="screen">
            <h1>Host Controls</h1>
            <div class="status-badge" id="peer-count">0 Viewers Connected</div>
            
            <button class="master-btn" onclick="togglePlaybackHost(event)">Play</button>
            
            <div class="source-box">
                <p>Change Video Source</p>
                <input type="text" id="video-url-input" placeholder="Paste an MP4 URL here..." autocomplete="off">
                <button class="btn" style="background: #4f46e5; padding: 0.8rem; margin: 0; box-shadow: none;" onclick="changeVideoSource()">Update Video</button>
            </div>
        </div>

        <div id="screen-peer" class="screen">
            <h1>Ready to Watch</h1>
            <div class="status-badge" style="background: rgba(16, 185, 129, 0.2); color: #10b981;">Connected</div>
            <p style="color: #9ca3af; margin-top: 1rem; font-size: 0.95rem;">Waiting for the host to start the video...</p>
        </div>

        <div id="debug-terminal">
            <div class="log-entry">System: Ready to connect.</div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://epicsax.onrender.com/"; 

        const video = document.getElementById('sync-video');
        let socket = null;
        let isPlaying = false;
        let isHostMode = false;

        let clockOffset = 0;
        let isClockLocked = false;
        let heartbeatInterval = null;
        let peerCount = 0;
        let lastHeartbeat = null;
        let scheduledPlayData = null;

        function sysLog(msg, level = 'info') {
            const term = document.getElementById('debug-terminal');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${level}`;
            
            // Format time nicely
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            entry.innerText = `[${timeStr}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initializeUplink() {
            video.play().then(() => { video.pause(); video.currentTime = 0; }).catch(() => { });
            showScreen('screen-loading');
            connectToServer();
        }

        function getMatrixTime() {
            return performance.now() + clockOffset;
        }

        function aggressiveSync(onComplete) {
            let pingsSent = 0;
            let pingsReceived = 0;
            const maxPings = 10; 
            const syncHistory = [];

            const fallbackTimeout = setTimeout(() => {
                if (!isClockLocked) {
                    if (syncHistory.length > 0) finalizeSync(syncHistory, onComplete);
                    else {
                        sysLog(`Network issue: Server ping timeout. Retrying...`, 'error');
                        aggressiveSync(onComplete); 
                    }
                }
            }, 3000);

            const burstInterval = setInterval(() => {
                if (pingsSent >= maxPings) {
                    clearInterval(burstInterval);
                    return;
                }

                const startPing = performance.now();
                socket.emit('sync-ping', (serverTime) => {
                    const rtt = performance.now() - startPing;
                    const offset = (serverTime + (rtt / 2)) - performance.now();
                    syncHistory.push({ rtt, offset });
                    pingsReceived++;

                    if (pingsReceived === maxPings && !isClockLocked) {
                        clearTimeout(fallbackTimeout);
                        finalizeSync(syncHistory, onComplete);
                    }
                });
                pingsSent++;
            }, 100);
        }

        function finalizeSync(history, onComplete) {
            history.sort((a, b) => a.rtt - b.rtt);
            const best3 = history.slice(0, 3);
            clockOffset = best3.reduce((sum, p) => sum + p.offset, 0) / best3.length;
            isClockLocked = true;
            sysLog(`Connection stable. Time synchronized.`, 'success');
            setInterval(maintenancePing, 4000);
            if(onComplete) onComplete();
        }

        function maintenancePing() {
            const startPing = performance.now();
            socket.emit('sync-ping', (serverTime) => {
                const rtt = performance.now() - startPing;
                if (rtt < 100) clockOffset = (serverTime + (rtt / 2)) - performance.now();
            });
        }

        function connectToServer() {
            socket = io(SERVER_URL);
            socket.on('connect', () => {
                sysLog(`Connected to SyncSpace server.`);
                aggressiveSync(() => {
                    sysLog(`Requesting room access...`);
                    socket.emit('request-entry', (response) => {
                        if (response.role === 'host') initHost();
                        else initPeer();
                    });
                });
            });
        }

        // Seamless Loop Logic
        video.addEventListener('ended', () => {
            if (isHostMode) {
                sysLog(`Video ended. Looping smoothly...`, 'info');
                const executeTime = getMatrixTime() + 150; 
                isPlaying = true;
                socket.emit('sync-command', { action: 'play', targetTime: executeTime, position: 0 });
                scheduledPlayData = { targetTime: executeTime, position: 0 };
            } else {
                sysLog(`Video ended. Waiting for host...`, 'info');
            }
        });

        // Frame Engine
        function dictationLoop() {
            const currentMatrixTime = getMatrixTime();

            if (scheduledPlayData && currentMatrixTime >= scheduledPlayData.targetTime) {
                document.body.classList.add('playing'); 
                try {
                    if (!isNaN(video.duration)) {
                        video.currentTime = scheduledPlayData.position;
                    }
                } catch(e) {
                    sysLog(`Buffering: Waiting for video stream.`, 'warn');
                }

                const p = video.play();
                if (p !== undefined) p.catch(() => sysLog(`Autoplay blocked by browser. Tap screen to resume.`, 'error'));
                scheduledPlayData = null;
            }

            if (isPlaying && !isHostMode && !video.paused && !scheduledPlayData && lastHeartbeat) {
                if (!isNaN(video.duration)) {
                    const transitTime = (currentMatrixTime - lastHeartbeat.matrixTime) / 1000;
                    const ghostPlayhead = lastHeartbeat.hostVideoTime + transitTime;
                    const drift = ghostPlayhead - video.currentTime;

                    if (Math.abs(drift) > 0.25) {
                        sysLog(`Sync adjustment: Aligning streams.`, 'warn');
                        try { video.currentTime = ghostPlayhead; } catch(e){}
                    }
                    else if (Math.abs(drift) > 0.015) { 
                        video.playbackRate = Math.max(0.8, Math.min(1.2, 1.0 + (drift * 2.5)));
                    }
                    else {
                        video.playbackRate = 1.0;
                    }
                }
            }
            requestAnimationFrame(dictationLoop);
        }
        requestAnimationFrame(dictationLoop);

        // ==========================================
        // HOST IMPLEMENTATION
        // ==========================================
        function initHost() {
            isHostMode = true;
            showScreen('screen-host');
            sysLog(`You are the Host. You control the room.`, 'log-host');

            socket.on('peer-joined', () => {
                peerCount++;
                document.getElementById('peer-count').innerText = `${peerCount} Viewer${peerCount !== 1 ? 's' : ''} Connected`;
                
                socket.emit('sync-command', { 
                    action: 'force-state', 
                    url: video.src,
                    isPlaying: isPlaying,
                    targetTime: isPlaying ? getMatrixTime() + 500 : null,
                    position: isNaN(video.duration) ? 0 : video.currentTime
                });
            });

            socket.on('peer-left', (size) => {
                peerCount = size;
                document.getElementById('peer-count').innerText = `${peerCount} Viewer${peerCount !== 1 ? 's' : ''} Connected`;
            });
        }

        function changeVideoSource() {
            const newUrl = document.getElementById('video-url-input').value.trim();
            if (!newUrl) return;

            isPlaying = false;
            video.pause();
            document.body.classList.remove('playing');
            if (heartbeatInterval) clearInterval(heartbeatInterval);

            const btn = document.querySelector('#screen-host .master-btn');
            if(btn) {
                btn.innerText = "Play";
                btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
            }

            video.src = newUrl;
            video.load();
            sysLog(`Video source updated. Sharing with room.`, 'log-host');

            socket.emit('sync-command', { action: 'source-override', url: newUrl });
            document.getElementById('video-url-input').value = ""; 
        }

        function togglePlaybackHost(event) {
            if (event) event.stopPropagation();
            if (!isClockLocked) return;

            const btn = document.querySelector('#screen-host .master-btn');

            if (!isPlaying) {
                const executeTime = getMatrixTime() + 400;
                isPlaying = true;
                if(btn) {
                    btn.innerText = "Pause";
                    btn.style.background = "linear-gradient(135deg, #f59e0b, #d97706)";
                }

                const currentPos = isNaN(video.duration) ? 0 : video.currentTime;
                socket.emit('sync-command', { action: 'play', targetTime: executeTime, position: currentPos });

                if (heartbeatInterval) clearInterval(heartbeatInterval);
                heartbeatInterval = setInterval(() => {
                    if (!video.paused && !isNaN(video.duration)) {
                        socket.emit('sync-command', { action: 'heartbeat', matrixTime: getMatrixTime(), hostVideoTime: video.currentTime });
                    }
                }, 200);

                document.body.classList.add('playing');
                setTimeout(() => { 
                    const p = video.play();
                    if(p !== undefined) p.catch(e => sysLog(`Playback error: ${e.message}`, 'error'));
                }, Math.max(0, executeTime - getMatrixTime()));
                
            } else {
                isPlaying = false;
                if(btn) {
                    btn.innerText = "Play";
                    btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
                }
                video.pause();
                document.body.classList.remove('playing');
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                socket.emit('sync-command', { action: 'pause' });
                sysLog(`Video paused.`, 'info');
            }
        }

        document.addEventListener('click', (e) => { 
            if (isHostMode && isPlaying && e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
                togglePlaybackHost(e); 
            }
            if (!isHostMode && isPlaying && video.paused) {
                video.play().catch(()=>{});
            }
        });

        // ==========================================
        // VIEWER IMPLEMENTATION
        // ==========================================
        function initPeer() {
            showScreen('screen-peer');
            sysLog(`Joined room as a Viewer.`, 'success');

            socket.on('sync-execute', (data) => {
                if (data.action === 'play') {
                    isPlaying = true;
                    scheduledPlayData = { targetTime: data.targetTime, position: data.position };
                    sysLog(`Host started the video.`, 'success');
                }
                else if (data.action === 'heartbeat') {
                    lastHeartbeat = { matrixTime: data.matrixTime, hostVideoTime: data.hostVideoTime };
                }
                else if (data.action === 'pause') {
                    isPlaying = false;
                    scheduledPlayData = null;
                    lastHeartbeat = null;
                    video.pause();
                    video.playbackRate = 1.0;
                    document.body.classList.remove('playing');
                    sysLog(`Host paused the video.`, 'warn');
                }
                else if (data.action === 'source-override') {
                    video.src = data.url;
                    video.load();
                    sysLog(`Host changed the video source.`, 'info');
                }
                else if (data.action === 'force-state') {
                    if (video.src !== data.url) {
                        video.src = data.url;
                        video.load();
                    }
                    if (data.isPlaying && data.targetTime) {
                        isPlaying = true;
                        scheduledPlayData = { targetTime: data.targetTime, position: data.position };
                    } else {
                        try { if (!isNaN(video.duration)) video.currentTime = data.position; } catch(e){}
                    }
                }
            });

            socket.on('host-disconnected', () => { 
                sysLog(`Host disconnected. Resetting room...`, 'error');
                setTimeout(() => location.reload(), 2000); 
            });
        }
    </script>
</body>
</html>
